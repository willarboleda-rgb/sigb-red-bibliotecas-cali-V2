<div class="floating-tools-v2">

    <div class="accessibility-panel-v2" id="accessibilityPanelV2">

        <button onclick="enableReadMode()" title="Lector de pantalla">
            <i class="fa-solid fa-volume-high"></i>
        </button>

        <button onclick="increaseText()" title="Aumentar texto">
            <i class="fa-solid fa-text-height"></i>
        </button>

        <button onclick="toggleContrast()" title="Alto contraste">
            <i class="fa-solid fa-circle-half-stroke"></i>
        </button>

        <button onclick="enableKeyboardMode()" title="Navegación por teclado">
            <i class="fa-solid fa-keyboard"></i>
        </button>

        <button onclick="zoomPage()" title="Zoom">
            <i class="fa-solid fa-magnifying-glass-plus"></i>
        </button>

        <button onclick="signLanguageSoon()" title="Lengua de señas">
            <i class="fa-solid fa-hands"></i>
        </button>

        <button onclick="toggleFocusMode()" title="Modo sin distracciones">
            <i class="fa-solid fa-eye"></i>
        </button>

    </div>

    <button class="accessibility-main-v2"
            onclick="toggleAccessibilityV2()"
            title="Accesibilidad">

        <i class="fa-solid fa-universal-access"></i>

    </button>

</div>
