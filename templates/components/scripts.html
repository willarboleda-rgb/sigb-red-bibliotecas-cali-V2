<script>
    function toggleChatbot() {
        const box = document.getElementById("chatbotBox");
        box.style.display = box.style.display === "flex" ? "none" : "flex";
    }

    function addMessage(text, type = "bot") {
        const messages = document.getElementById("chatbotMessages");

        const div = document.createElement("div");
        div.className = type === "user" ? "user-message" : "bot-message";
        div.innerHTML = text;

        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    function getLumaResponse(text) {

        }

        if (pregunta.includes("libro") || pregunta.includes("buscar") || pregunta.includes("autor")) {
            return "Puedes buscar libros desde el buscador principal escribiendo título, autor, tema o palabra clave.";
        }

        if (pregunta.includes("biblioteca") || pregunta.includes("comuna") || pregunta.includes("cercana") || pregunta.includes("mapa")) {
            return "Puedes consultar bibliotecas por comuna usando el mapa interactivo. Allí encontrarás ubicación, comuna y servicios disponibles.";

        if (pregunta.includes("dislexia")) {

        }

        if (pregunta.includes("contraseña") || pregunta.includes("clave")) {
            return "Puedes usar la opción ¿Olvidaste tu contraseña? en el login. En esta demo está como funcionalidad visual.";
        }

        if (pregunta.includes("registro") || pregunta.includes("crear cuenta")) {
            return "Para crear una cuenta ciudadana, ingresa a la opción Crear cuenta ciudadana desde el login.";
        }

        if (pregunta.includes("maleta")) {
            return "Las Maletas Viajeras son colecciones itinerantes de libros y materiales de lectura que se prestan a comunidades.";

        if (pregunta.includes("llave")) {

        }

        if (pregunta.includes("recomienda") || pregunta.includes("recomendación") || pregunta.includes("recomendacion")) {
            return "Te recomiendo explorar literatura caleña, audiolibros, contenidos infantiles, cómics y agenda cultural cercana a tu biblioteca favorita.";
        }
        // ACTIVIDADES PARA NIÑOS

if (

    return "Actualmente la Red cuenta con clubes de lectura infantil, actividades de promoción lectora, talleres creativos, cuentería y programación cultural para niños y niñas.";

}


// HORARIOS

if (
    pregunta.includes("horario") ||
    pregunta.includes("horarios")
) {
    return "Los horarios pueden variar según cada biblioteca. Próximamente podrás consultarlos directamente desde la sección Bibliotecas.";
}


// PRESTAMO

if (
    pregunta.includes("prestar") ||

}

if (

    return "En esta demo se muestran 18 eventos culturales programados para el mes, incluyendo clubes de lectura, talleres y exposiciones.";

    function sendChatbotMessage() {
        const input = document.getElementById("chatbotInput");
        const text = input.value.trim();

        if (text === "") return;

        addMessage(text, "user");

        setTimeout(() => {
            const response = getLumaResponse(text);
            addMessage(response, "bot");
        }, 400);

        input.value = "";
    }

    function quickQuestion(tipo) {
        let pregunta = "";

        if (tipo === "libros") pregunta = "¿Cómo busco un libro?";
        if (tipo === "eventos") pregunta = "¿Qué eventos culturales hay?";
        if (tipo === "bibliotecas") pregunta = "¿Cómo consulto bibliotecas por comuna?";
        if (tipo === "dislexia") pregunta = "¿Cómo activo el modo dislexia?";
        if (tipo === "infantil") pregunta = "¿Qué actividades hay para niños?";
        if (tipo === "digital")  pregunta = "¿Qué ofrece la biblioteca digital?";
        addMessage(pregunta, "user");

        setTimeout(() => {
            addMessage(getLumaResponse(pregunta), "bot");
        }, 400);
    }

    document.addEventListener("DOMContentLoaded", function () {
        const input = document.getElementById("chatbotInput");

        if (input) {
            input.addEventListener("keypress", function (event) {
                if (event.key === "Enter") {
                    sendChatbotMessage();
                }
            });
        }
    });

    function toggleAccessibility() {
        const options = document.getElementById("accessibilityOptions");
        options.style.display = options.style.display === "flex" ? "none" : "flex";
    }

    function toggleDyslexiaMode() {
        document.body.classList.toggle("dyslexia-mode");
    }

    function increaseFont() {
        document.body.classList.toggle("large-font-mode");
    }

    function toggleContrast() {
        document.body.classList.toggle("high-contrast-mode");
    }
    function showVoiceSoon() {
    addMessage(
        "🎤 Próximamente podrás hablar con Luma mediante comandos de voz. Esta opción está pensada para apoyar la accesibilidad de personas con discapacidad visual.",
        "bot"
    );
}
    
</script>
